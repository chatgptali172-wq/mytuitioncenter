  <main>

<!-- PAGE 5: CONTACT (Light) -->
    <div id="page-contact" class="page active" data-theme="cinematic-dark">
      <section class="section-mega container-sm">
        <h1 class="display-xl" style="margin-bottom: var(--space-xl);">Get in Touch</h1>
        <p class="body-lg" style="margin-bottom: var(--space-huge);">
          Have questions about enrollment or need corporate training? Our team is ready to help.
        </p>

        <div style="background-color: var(--canvas-night-elevated); padding: var(--space-xxl); border-radius: 12px; border: 1px solid var(--overlay-light-10);">
          <div id="contact-form-container">
            <form onsubmit="submitContact(event)">
              <div class="form-group">
                <label for="contact-name" style="display: block; margin-bottom: 8px; font-weight: 500;">Name</label>
                <input type="text" id="contact-name" class="form-control" placeholder="Jane Doe" required>
              </div>
              <div class="form-group">
                <label for="contact-email" style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                <input type="email" id="contact-email" class="form-control" placeholder="jane@example.com" required>
              </div>
              <div class="form-group">
                <label for="contact-message" style="display: block; margin-bottom: 8px; font-weight: 500;">Message</label>
                <textarea id="contact-message" class="form-control" rows="5" placeholder="How can we help?" required></textarea>
              </div>
              <button class="btn btn-primary" type="submit" style="width: 100%;">Send Message</button>
            </form>
          </div>
        </div>
      </section>
    </div>

    
  </main>
